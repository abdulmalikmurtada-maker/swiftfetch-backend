<!DOCTYPE html>
<html lang="ha">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftFetch 🚀 – Sauke Bidiyo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:       #0b0f1a;
      --surface:  #131929;
      --card:     #1a2235;
      --border:   #2a3750;
      --accent:   #22c55e;
      --accent2:  #16a34a;
      --text:     #f0f4ff;
      --muted:    #7a90b8;
      --danger:   #f87171;
      --radius:   14px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Background grid ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--surface), var(--card));
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 22px;
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 1.4rem;
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo-name span {
      color: var(--accent);
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    header h1 em {
      font-style: normal;
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Supported platforms ────────────────────────────────────── */
    .platforms {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .platform-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    /* ── Input group ────────────────────────────────────────────── */
    .input-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s;
    }

    .url-input::placeholder { color: var(--muted); }

    .url-input:focus {
      border-color: var(--accent);
    }

    .btn-fetch {
      background: var(--accent);
      color: #0b0f1a;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 13px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .1s;
    }

    .btn-fetch:hover  { background: #34d368; }
    .btn-fetch:active { transform: scale(0.97); }
    .btn-fetch:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Loader ─────────────────────────────────────────────────── */
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .loader.visible { display: flex; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Video preview ──────────────────────────────────────────── */
    .preview {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .preview.visible { display: flex; }

    .thumb-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: var(--surface);
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .duration-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: var(--font-display);
    }

    .video-meta h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .video-meta span {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Format list ────────────────────────────────────────────── */
    .formats-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .format-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .format-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, background .2s;
    }

    .format-btn:hover {
      border-color: var(--accent);
      background: rgba(34,197,94,.06);
    }

    .format-btn .fmt-label { font-weight: 500; }

    .format-btn .fmt-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .fmt-size {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .fmt-dl {
      background: var(--accent);
      color: #0b0f1a;
      border: none;
      border-radius: 7px;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 6px 13px;
      cursor: pointer;
      transition: background .2s;
    }

    .fmt-dl:hover { background: #34d368; }

    /* ── Status messages ────────────────────────────────────────── */
    .status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .status.visible { display: flex; }

    .status.error {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: var(--danger);
    }

    .status.success {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      color: var(--accent);
    }

    .status-icon { font-size: 1rem; flex-shrink: 0; }

    /* ── Download progress ──────────────────────────────────────── */
    .dl-status {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 12px 0 4px;
    }

    .dl-status.visible { display: flex; }

    .dl-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .dl-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      width: 0%;
      transition: width .3s;
      animation: indeterminate 1.4s ease infinite;
    }

    @keyframes indeterminate {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    .dl-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: -10px;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-icon">🚀</span>
        <span class="logo-name">Swift<span>Fetch</span></span>
      </div>
      <h1>Sauke <em>Bidiyo</em><br>Da Sauri</h1>
      <p>Saka URL na bidiyo, zaɓi inganci, a sauke — kyauta, nan da nan.</p>
    </header>

    <!-- Supported platforms -->
    <div class="platforms">
      <span class="platform-tag">YouTube</span>
      <span class="platform-tag">Facebook</span>
      <span class="platform-tag">Instagram</span>
      <span class="platform-tag">TikTok</span>
      <span class="platform-tag">Twitter / X</span>
      <span class="platform-tag">+1000 kari</span>
    </div>

    <!-- Main card -->
    <div class="card">
      <label class="input-label" for="urlInput">Saka URL na bidiyo</label>
      <div class="input-wrap">
        <input
          id="urlInput"
          class="url-input"
          type="url"
          placeholder="https://www.youtube.com/watch?v=..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">
          Nemo
        </button>
      </div>

      <!-- Loader -->
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <span>Ana nemo bayanan bidiyo…</span>
      </div>

      <!-- Error / success status -->
      <div class="status error" id="errorMsg">
        <span class="status-icon">❌</span>
        <span id="errorText"></span>
      </div>

      <!-- Video preview -->
      <div class="preview" id="preview">
        <div class="thumb-wrap">
          <img id="thumbnail" src="" alt="Thumbnail" />
          <span class="duration-badge" id="duration"></span>
        </div>
        <div class="video-meta">
          <h3 id="videoTitle"></h3>
          <span id="uploader"></span>
        </div>

        <div class="formats-label">Zaɓi Inganci</div>
        <div class="format-list" id="formatList"></div>

        <!-- Download progress -->
        <div class="dl-status" id="dlStatus">
          <div class="dl-bar-wrap"><div class="dl-bar"></div></div>
          <div class="dl-label" id="dlLabel">Ana sauke…</div>
        </div>
      </div>
    </div>

    <footer>
      Ana amfani da <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a> &amp; ffmpeg.
      Don amfanin sirri kawai.
    </footer>

  </div>

  <script>
    // ── CONFIG: Replace with your Railway/Render backend URL ──────
    const BACKEND_URL = "https://YOUR-BACKEND.up.railway.app";
    // Example: "https://swiftfetch-production.up.railway.app"
    // ─────────────────────────────────────────────────────────────

    let currentTitle = "video";

    async function fetchInfo() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return showError("Da fatan a saka URL.");
      if (!isValidUrl(url)) return showError("URL ba daidai ba ce.");

      setLoading(true);
      hideAll();

      try {
        const res = await fetch(`${BACKEND_URL}/info`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "Matsala ta faru.");
        }

        showPreview(data, url);
      } catch (err) {
        showError(err.message || "Ba a iya haɗa da server. Sake gwadawa.");
      } finally {
        setLoading(false);
      }
    }

    function showPreview(data, url) {
      currentTitle = data.title || "video";

      document.getElementById("thumbnail").src = data.thumbnail || "";
      document.getElementById("videoTitle").textContent = data.title || "Babu taken";
      document.getElementById("uploader").textContent = data.uploader
        ? `📺 ${data.uploader}`
        : "";
      document.getElementById("duration").textContent = data.duration
        ? formatDuration(data.duration)
        : "";

      const list = document.getElementById("formatList");
      list.innerHTML = "";

      if (!data.formats || data.formats.length === 0) {
        list.innerHTML = `<p style="color:var(--muted);font-size:.85rem">Ba a sami ingancin bidiyo ba.</p>`;
      } else {
        data.formats.forEach((fmt) => {
          const btn = document.createElement("div");
          btn.className = "format-btn";
          btn.innerHTML = `
            <span class="fmt-label">${fmt.label}</span>
            <span class="fmt-right">
              ${fmt.filesize ? `<span class="fmt-size">${formatSize(fmt.filesize)}</span>` : ""}
              <button class="fmt-dl" onclick="download('${encodeURIComponent(url)}','${fmt.formatId}','${fmt.ext}')">
                ⬇ Sauke
              </button>
            </span>
          `;
          list.appendChild(btn);
        });
      }

      document.getElementById("preview").classList.add("visible");
    }

    function download(encodedUrl, formatId, ext) {
      const url = decodeURIComponent(encodedUrl);
      const dlStatus = document.getElementById("dlStatus");
      const dlLabel  = document.getElementById("dlLabel");

      dlStatus.classList.add("visible");
      dlLabel.textContent = "Ana fara sauke…";

      const params = new URLSearchParams({
        url,
        formatId,
        ext,
        title: currentTitle,
      });

      // Trigger browser download
      const a = document.createElement("a");
      a.href = `${BACKEND_URL}/download?${params}`;
      a.download = `${currentTitle}.${ext}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // Show message then hide after delay
      dlLabel.textContent = "An fara sauke! Duba ma'ajiyar ka.";
      setTimeout(() => {
        dlStatus.classList.remove("visible");
      }, 5000);
    }

    // ── UI helpers ───────────────────────────────────────────────
    function setLoading(on) {
      document.getElementById("loader").classList.toggle("visible", on);
      document.getElementById("fetchBtn").disabled = on;
      document.getElementById("fetchBtn").textContent = on ? "Ana nemo…" : "Nemo";
    }

    function hideAll() {
      document.getElementById("errorMsg").classList.remove("visible");
      document.getElementById("preview").classList.remove("visible");
      document.getElementById("dlStatus").classList.remove("visible");
    }

    function showError(msg) {
      document.getElementById("errorText").textContent = msg;
      document.getElementById("errorMsg").classList.add("visible");
    }

    function isValidUrl(s) {
      try { new URL(s); return true; } catch { return false; }
    }

    function formatDuration(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return h > 0
        ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
        : `${m}:${String(s).padStart(2,"0")}`;
    }

    function formatSize(bytes) {
      if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + " GB";
      if (bytes > 1e6) return (bytes / 1e6).toFixed(1) + " MB";
      if (bytes > 1e3) return (bytes / 1e3).toFixed(1) + " KB";
      return bytes + " B";
    }

    // Allow Enter key
    document.getElementById("urlInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") fetchInfo();
    });
  </script>
</body>
</html>
